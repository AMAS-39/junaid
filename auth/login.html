<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Login | Nutrition Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body class="min-h-screen bg-gradient-to-br from-medical-50 via-white to-clinic-50 flex flex-col items-center justify-center p-4 pb-28" data-layout="none">

  <div class="w-full max-w-md">
    <div class="flex justify-end mb-4">
      <label class="ncms-lang-switch flex items-center gap-2">
        <span class="text-xs font-semibold text-slate-500" data-i18n="language.label">Language</span>
        <select id="ncms-language-select" class="ncms-lang-select" data-i18n-aria="language.label">
          <option value="en">English</option>
          <option value="ar">العربية</option>
          <option value="ku">کوردی</option>
        </select>
      </label>
    </div>

    <div class="text-center mb-8">
      <div class="inline-flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-medical-400 to-clinic-400 text-white font-bold text-lg mb-4 shadow-lg shadow-medical-200">
        NC
      </div>
      <h1 class="text-2xl sm:text-3xl font-bold text-slate-800" data-i18n="login.title">Nutrition Clinic</h1>
      <p class="text-slate-500 mt-2 text-sm" data-i18n="login.subtitle">Sign in to your account</p>
    </div>

    <div class="ncms-card p-6 sm:p-8 shadow-lg shadow-slate-200/50">
      <form id="loginForm" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="login.email">Email</label>
          <input id="email" type="email" required autocomplete="email" class="ncms-input" data-i18n-placeholder="login.emailPlaceholder" placeholder="you@clinic.com" />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5" data-i18n="login.password">Password</label>
          <input id="password" type="password" required autocomplete="current-password" class="ncms-input" placeholder="••••••••" />
        </div>
        <button id="loginBtn" type="submit" class="ncms-btn-primary w-full py-3.5 mt-2" data-i18n="buttons.login">
          Login
        </button>
      </form>
      <p id="errorMsg" class="text-red-500 text-center mt-4 text-sm"></p>
      <div class="flex flex-col sm:flex-row items-center justify-center gap-2 sm:gap-4 mt-4 text-sm">
        <button id="forgotPasswordBtn" type="button" class="text-slate-500 hover:text-medical-600 font-medium" data-i18n="buttons.forgotPassword">
          Forgot password?
        </button>
        <a href="setup.html" class="text-medical-600 hover:text-medical-700 font-medium" data-i18n="buttons.createStaff">
          Create staff account
        </a>
      </div>
    </div>

    <p class="text-center text-xs text-slate-400 mt-6" data-i18n="app.subtitle">Nutrition Clinic Management System</p>
  </div>

  <script type="module" src="../assets/js/pages/auth/login.js"></script>
</body>
</html>
