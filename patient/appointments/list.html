<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointments | Nutrition Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <section class="page-header">
      <h1>Appointments</h1>
      <p>Book and view your visits</p>
    </section>

    <form id="appointmentForm" class="patient-form-card">
      <h2>Request Appointment</h2>
      <div class="form-group mb-3">
        <label for="preferredDateTime">Preferred date & time</label>
        <input id="preferredDateTime" type="datetime-local" required class="form-input" />
      </div>
      <div class="form-group mb-3">
        <label for="reason">Reason</label>
        <input id="reason" type="text" required class="form-input" placeholder="e.g. Follow-up visit" />
      </div>
      <div class="form-group mb-4">
        <label for="note">Note (optional)</label>
        <textarea id="note" class="form-textarea" rows="2" placeholder="Additional details..."></textarea>
      </div>
      <button id="saveBtn" type="submit" class="view-btn">Request Appointment</button>
    </form>

    <h2 class="text-lg font-bold text-slate-800 mb-3">My Appointments</h2>
    <div id="appointmentsList"></div>
    <div id="emptyState" class="empty-state hidden">
      <h3>No appointments</h3>
      <p>Request your first appointment above.</p>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/patient/appointments-list.js"></script>
</body>
</html>
