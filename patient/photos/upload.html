<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Upload Photo | Nutrition Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen patient-body">
  <div id="page-content" class="patient-app-page">
    <a href="../dashboard.html" class="patient-back-link">← Back to Home</a>
    <header class="patient-page-header">
      <h1 class="patient-page-title">Upload Photo</h1>
      <p class="patient-page-sub">Share meals, medicine, or progress photos</p>
    </header>

    <form id="photoForm" class="patient-form-card">
      <h2 class="patient-form-title">Add a photo</h2>
      <div class="form-group mb-3">
        <label for="photoType">What is this photo?</label>
        <select id="photoType" required class="form-input patient-input">
          <option value="meal">My meal</option>
          <option value="medicine">Medicine</option>
          <option value="progress">Progress photo</option>
          <option value="lab-report">Lab report</option>
        </select>
      </div>
      <div class="form-group mb-3">
        <label for="photoFile">Choose image</label>
        <input id="photoFile" type="file" required accept="image/jpeg,image/png,image/webp,.jpg,.jpeg,.png,.webp" class="form-input patient-input" />
        <p id="fileHint" class="patient-field-hint">JPG, PNG, or WEBP — max 5MB</p>
      </div>
      <div class="form-group mb-4">
        <label for="note">Short note (optional)</label>
        <textarea id="note" class="form-textarea patient-input" rows="3" placeholder="e.g. Lunch today"></textarea>
      </div>
      <button id="saveBtn" type="submit" class="patient-btn-primary">Upload photo</button>
    </form>

    <h2 class="patient-section-title">Your uploads</h2>
    <div id="photoList" class="patient-card-stack"></div>
    <div id="emptyState" class="patient-empty-state hidden">
      <span class="patient-empty-icon" aria-hidden="true">📷</span>
      <h3>No photos yet</h3>
      <p>Upload a photo using the form above.</p>
      <p class="patient-empty-hint">Your doctor can review them with you.</p>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/patient/photos-upload.js"></script>
</body>
</html>
