<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Photo | Nutrition Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <section class="page-header">
      <h1>Upload Photo</h1>
      <p>Upload medicine, meal, progress, or lab report images</p>
    </section>

    <form id="photoForm" class="patient-form-card">
      <h2>Upload New Photo</h2>
      <div class="form-group mb-3">
        <label for="photoType">Photo type</label>
        <select id="photoType" required class="form-input">
          <option value="medicine">Medicine</option>
          <option value="meal">Meal</option>
          <option value="progress">Progress</option>
          <option value="lab-report">Lab Report</option>
        </select>
      </div>
      <div class="form-group mb-3">
        <label for="photoFile">Image file</label>
        <input id="photoFile" type="file" required accept="image/jpeg,image/png,image/webp,.jpg,.jpeg,.png,.webp" class="form-input" />
        <p id="fileHint" class="text-xs text-slate-400 mt-1">JPG, PNG, WEBP — max 5MB</p>
      </div>
      <div class="form-group mb-4">
        <label for="note">Note (optional)</label>
        <textarea id="note" class="form-textarea" rows="3" placeholder="Describe the photo..."></textarea>
      </div>
      <button id="saveBtn" type="submit" class="view-btn">Upload Photo</button>
    </form>

    <h2 class="text-lg font-bold text-slate-800 mb-3 mt-6">Your Uploads</h2>
    <div id="photoList"></div>
    <div id="emptyState" class="empty-state hidden">
      <h3>No photos yet</h3>
      <p>Upload your first photo above.</p>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/patient/photos-upload.js"></script>
</body>
</html>
