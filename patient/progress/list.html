<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Progress | Nutrition Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <section class="page-header">
      <h1>My Progress</h1>
      <p>Log your weight and track changes</p>
    </section>

    <form id="progressForm" class="patient-form-card">
      <h2>Add Weight Entry</h2>
      <div class="form-group mb-3">
        <label for="weight">Weight (kg)</label>
        <input id="weight" type="number" required min="1" step="0.1" class="form-input" placeholder="e.g. 75" />
      </div>
      <div class="form-group mb-4">
        <label for="note">Note (optional)</label>
        <textarea id="note" class="form-textarea" rows="2" placeholder="How are you feeling?"></textarea>
      </div>
      <button id="saveBtn" type="submit" class="view-btn">Save Progress</button>
    </form>

    <h2 class="text-lg font-bold text-slate-800 mb-3">History</h2>
    <div id="progressList" class="progress-list"></div>
    <div id="emptyState" class="empty-state hidden">
      <h3>No entries yet</h3>
      <p>Add your first weight entry above.</p>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/patient/progress-list.js"></script>
</body>
</html>
