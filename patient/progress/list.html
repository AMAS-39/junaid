<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>My Progress | Nutrition Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen patient-body">
  <div id="page-content" class="patient-app-page">
    <a href="../dashboard.html" class="patient-back-link">← Back to Home</a>
    <header class="patient-page-header">
      <h1 class="patient-page-title">My Progress</h1>
      <p class="patient-page-sub">Track your weight — one step at a time</p>
    </header>

    <form id="progressForm" class="patient-form-card">
      <h2 class="patient-form-title">Add your weight</h2>
      <div class="form-group mb-3">
        <label for="weight">Weight (kg)</label>
        <input id="weight" type="number" required min="1" step="0.1" class="form-input patient-input" placeholder="e.g. 75" />
      </div>
      <div class="form-group mb-4">
        <label for="note">How do you feel? (optional)</label>
        <textarea id="note" class="form-textarea patient-input" rows="2" placeholder="e.g. Feeling good today"></textarea>
      </div>
      <button id="saveBtn" type="submit" class="patient-btn-primary">Save my weight</button>
    </form>

    <h2 class="patient-section-title">Your history</h2>
    <div id="progressList" class="patient-card-stack"></div>
    <div id="emptyState" class="patient-empty-state hidden">
      <span class="patient-empty-icon" aria-hidden="true">📈</span>
      <h3>No weight entries yet</h3>
      <p>Add your weight above to start tracking.</p>
      <p class="patient-empty-hint">Small steps lead to big results.</p>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/patient/progress-list.js"></script>
</body>
</html>
