<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard | Nutrition Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content" class="dash-page patient-dash-page">
    <header class="dash-page-header patient-dash-header">
      <div>
        <h2 id="welcomeText" class="dash-page-title">Welcome</h2>
        <p id="dashboardSubtitle" class="dash-page-subtitle">Your health snapshot</p>
      </div>
    </header>

    <div id="summaryCards" class="dash-section"></div>

    <section id="todayChecklist" class="checklist-section-card">
      <div class="checklist-section-top">
        <div>
          <h2 class="checklist-main-title">Today's Checklist</h2>
          <p class="checklist-hint">Tap a meal to log details. Use ✓ when done.</p>
        </div>
        <span id="checklistDate" class="checklist-date-badge"></span>
      </div>

      <div id="checklistProgress" class="checklist-progress-card hidden">
        <div class="checklist-progress-top">
          <span id="checklistProgressPercent" class="checklist-progress-percent">0%</span>
          <span id="checklistProgressText" class="checklist-progress-text">0 of 5 completed</span>
        </div>
        <div class="checklist-progress-bar-wrap">
          <div id="checklistProgressBar" class="checklist-progress-bar"></div>
        </div>
      </div>

      <div id="checklistItems" class="checklist-items"></div>
    </section>

    <section class="dash-section">
      <h3 class="dash-section-title">Quick actions</h3>
      <div id="dashboardGrid"></div>
    </section>
  </div>
  <script type="module" src="../assets/js/pages/patient/patient-dashboard.js"></script>
</body>
</html>
