<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>My Dashboard | Nutrition Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen patient-body">
  <div id="page-content" class="patient-app-page">
    <header class="patient-hero">
      <p class="patient-hero-greeting" data-i18n="common.goodDay">Good day 👋</p>
      <h1 id="welcomeText" class="patient-hero-title">Hello</h1>
      <p id="dashboardSubtitle" class="patient-hero-sub" data-i18n="patient.dashboardSubtitle">Here is your plan for today</p>
    </header>

    <section class="patient-today-section">
      <div class="patient-section-head">
        <h2 class="patient-section-title" data-i18n="patient.todaySection">Today</h2>
        <span id="todayDateBadge" class="patient-date-pill"></span>
      </div>
      <div id="todayCards" class="patient-today-cards"></div>
    </section>

    <section id="todayChecklist" class="checklist-section-card patient-checklist-wrap">
      <div class="checklist-section-top">
        <div>
          <h2 class="checklist-main-title" data-i18n="patient.foodChecklist">Today's food checklist</h2>
          <p class="checklist-hint" data-i18n="patient.checklistHint">Tap a meal to add details. Press ✓ when finished.</p>
        </div>
        <span id="checklistDate" class="checklist-date-badge"></span>
      </div>

      <div id="checklistProgress" class="checklist-progress-card hidden">
        <div class="checklist-progress-top">
          <span id="checklistProgressPercent" class="checklist-progress-percent">0%</span>
          <span id="checklistProgressText" class="checklist-progress-text">0 of 5 completed</span>
        </div>
        <div class="checklist-progress-bar-wrap">
          <div id="checklistProgressBar" class="checklist-progress-bar"></div>
        </div>
      </div>

      <div id="checklistItems" class="checklist-items"></div>
    </section>

    <section class="patient-actions-section">
      <h2 class="patient-section-title" data-i18n="common.whatDoYouNeed">What do you need?</h2>
      <div id="dashboardGrid"></div>
    </section>
  </div>
  <script type="module" src="../assets/js/pages/patient/patient-dashboard.js"></script>
</body>
</html>
