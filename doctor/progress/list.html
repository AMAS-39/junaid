<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Progress | Nutrition Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <a href="../patients/list.html" class="back-btn" data-back-param="patientId" data-back-template="../patients/details.html?id={patientId}" data-i18n="doctor.backToPatient">← Back to Patient</a>
    <div id="patientBanner" class="page-header"></div>
    <div id="progressContainer"></div>
    <div id="emptyState" class="empty-state hidden">
      <h3 data-i18n="pages.progress.emptyTitle">No progress entries</h3>
      <p data-i18n="pages.progress.emptyHint">Weight records will appear here when the patient logs progress.</p>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/doctor/progress-list.js"></script>
</body>
</html>
