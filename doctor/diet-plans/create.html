<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Diet Plan | Nutrition Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <button id="backBtn" type="button" class="back-btn">← Back</button>
    <section class="page-header">
      <h1>Create Diet Plan</h1>
      <p>Define meals, snacks, and hydration goals</p>
    </section>
    <div id="patientBanner" class="card hidden flex flex-col gap-1 mb-4"></div>
    <form id="dietPlanForm" class="card">
      <div id="patientSelectWrap" class="form-group hidden mb-4">
        <label for="patientSelect">Select Patient</label>
        <select id="patientSelect" class="form-input"></select>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label for="title">Plan Title</label>
          <input id="title" type="text" required class="form-input" placeholder="e.g. Week 1 Weight Loss Plan" />
        </div>
        <div class="form-group">
          <label for="waterGoal">Water Goal (liters/day)</label>
          <input id="waterGoal" type="number" min="0" step="0.1" class="form-input" placeholder="2.5" />
        </div>
        <div class="form-group">
          <label for="breakfast">Breakfast</label>
          <textarea id="breakfast" class="form-textarea" placeholder="Meal details..."></textarea>
        </div>
        <div class="form-group">
          <label for="lunch">Lunch</label>
          <textarea id="lunch" class="form-textarea" placeholder="Meal details..."></textarea>
        </div>
        <div class="form-group">
          <label for="dinner">Dinner</label>
          <textarea id="dinner" class="form-textarea" placeholder="Meal details..."></textarea>
        </div>
        <div class="form-group">
          <label for="snacks">Snacks</label>
          <textarea id="snacks" class="form-textarea" placeholder="Snack options..."></textarea>
        </div>
        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" class="form-textarea" placeholder="Additional instructions..."></textarea>
        </div>
      </div>
      <button id="saveBtn" type="submit" class="view-btn mt-4">Save Diet Plan</button>
    </form>
  </div>
  <script type="module" src="../../assets/js/pages/doctor/diet-plan-create.js"></script>
</body>
</html>
