<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Diet Plan | Nutrition Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <a href="list.html" class="back-btn" data-back-param="patientId" data-back-template="../patients/details.html?id={patientId}" data-i18n="buttons.back">← Back</a>
    <section class="page-header">
      <h1 data-i18n="pages.dietPlanCreate.title">Create Diet Plan</h1>
      <p data-i18n="pages.dietPlanCreate.subtitle">Define meals, snacks, and hydration goals</p>
    </section>
    <div id="patientBanner" class="card hidden flex flex-col gap-1 mb-4"></div>
    <form id="dietPlanForm" class="card">
      <div id="patientSelectWrap" class="form-group hidden mb-4">
        <label for="patientSelect" data-i18n="pages.dietPlanCreate.selectPatient">Select Patient</label>
        <select id="patientSelect" class="form-input"></select>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label for="title" data-i18n="pages.dietPlanCreate.planTitle">Plan Title</label>
          <input id="title" type="text" required class="form-input" data-i18n-placeholder="pages.dietPlanCreate.planTitlePlaceholder" placeholder="e.g. Week 1 Weight Loss Plan" />
        </div>
        <div class="form-group">
          <label for="waterGoal" data-i18n="pages.dietPlanCreate.waterGoal">Water Goal (liters/day)</label>
          <input id="waterGoal" type="number" min="0" step="0.1" class="form-input" data-i18n-placeholder="pages.dietPlanCreate.waterGoalPlaceholder" placeholder="2.5" />
        </div>
        <div class="form-group">
          <label for="breakfast" data-i18n="patient.breakfast">Breakfast</label>
          <textarea id="breakfast" class="form-textarea" data-i18n-placeholder="pages.dietPlanCreate.mealPlaceholder" placeholder="Meal details..."></textarea>
        </div>
        <div class="form-group">
          <label for="lunch" data-i18n="patient.lunch">Lunch</label>
          <textarea id="lunch" class="form-textarea" data-i18n-placeholder="pages.dietPlanCreate.mealPlaceholder" placeholder="Meal details..."></textarea>
        </div>
        <div class="form-group">
          <label for="dinner" data-i18n="patient.dinner">Dinner</label>
          <textarea id="dinner" class="form-textarea" data-i18n-placeholder="pages.dietPlanCreate.mealPlaceholder" placeholder="Meal details..."></textarea>
        </div>
        <div class="form-group">
          <label for="snacks" data-i18n="patient.snacks">Snacks</label>
          <textarea id="snacks" class="form-textarea" data-i18n-placeholder="pages.dietPlanCreate.snacksPlaceholder" placeholder="Snack options..."></textarea>
        </div>
        <div class="form-group">
          <label for="notes" data-i18n="patient.notes">Notes</label>
          <textarea id="notes" class="form-textarea" data-i18n-placeholder="pages.dietPlanCreate.notesPlaceholder" placeholder="Additional instructions..."></textarea>
        </div>
      </div>
      <button id="saveBtn" type="submit" class="view-btn mt-4" data-i18n="pages.dietPlanCreate.saveButton">Save Diet Plan</button>
    </form>
  </div>
  <script type="module" src="../../assets/js/pages/doctor/diet-plan-create.js"></script>
</body>
</html>
