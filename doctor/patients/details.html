<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Details | Nutrition Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <button id="backBtn" type="button" class="back-btn">← Back to Patients</button>
    <div id="patientDetails"></div>

    <section id="dailyComplianceSection" class="card daily-compliance-card hidden">
      <h2 class="daily-compliance-title">Daily Compliance</h2>
      <p class="daily-compliance-subtitle">Today's diet and water checklist for this patient.</p>
      <div id="dailyComplianceContent"></div>
    </section>

    <section id="doctorNotesSection" class="card doctor-notes-card hidden">
      <h2 class="doctor-notes-title">Private Doctor Notes</h2>
      <p class="doctor-notes-subtitle">Only you can see these notes. Patients and secretaries cannot access them.</p>

      <label for="newNoteInput" class="form-label">New note</label>
      <textarea
        id="newNoteInput"
        class="form-textarea"
        rows="4"
        placeholder="Write a private note about this patient..."
      ></textarea>
      <button type="button" id="saveNoteBtn" class="ncms-btn-primary doctor-notes-save-btn">Save Note</button>

      <div id="notesList" class="doctor-notes-list"></div>
      <div id="notesEmpty" class="doctor-notes-empty hidden">
        <p>No private notes yet. Add one above.</p>
      </div>
    </section>
  </div>
  <script type="module" src="../../assets/js/pages/doctor/patient-details.js"></script>
</body>
</html>
