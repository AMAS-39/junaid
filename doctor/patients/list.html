<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patients | Nutrition Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <section class="page-header">
      <div>
        <h1 data-i18n="pages.patients.title">Patients</h1>
        <p data-i18n="pages.patients.subtitle">View and search patient records</p>
      </div>
    </section>
    <div class="card">
      <input id="searchInput" type="text" data-i18n-placeholder="pages.patients.searchPlaceholder" placeholder="Search by patient name or phone..." class="form-input" />
    </div>
    <div id="patientsContainer" class="patients-grid"></div>
    <div id="emptyState" class="empty-state hidden">
      <h3 data-i18n="pages.patients.emptyTitle">No patients found</h3>
      <p data-i18n="pages.patients.emptyHint">No patient records match your search.</p>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/doctor/patients-list.js"></script>
</body>
</html>
