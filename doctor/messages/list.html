<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages | Nutrition Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <section class="page-header">
      <h1 data-i18n="pages.messages.title">Messages</h1>
      <p data-i18n="pages.messages.subtitle">Patient conversations</p>
    </section>
    <div class="chat-shell messages-layout">
      <aside class="messages-sidebar chat-sidebar" id="conversationList" aria-label="Conversations"></aside>
      <div class="messages-panel chat-panel" id="messagesPanel">
        <div class="chat-empty">
          <span class="chat-empty-icon" aria-hidden="true">💬</span>
          <h3 data-i18n="pages.messages.selectConversation">Select a conversation</h3>
          <p data-i18n="pages.messages.selectConversationHint">Select a conversation to view messages.</p>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/doctor/messages-list.js"></script>
</body>
</html>
