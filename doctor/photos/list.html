<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Photos | Nutrition Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <button id="backBtn" type="button" class="back-btn">← Back to Patient</button>
    <section class="page-header flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div id="patientBanner" class="page-header mb-0"></div>
      <button id="addPhotoBtn" type="button" class="ncms-btn-primary px-5 py-3">+ Add Photo Record</button>
    </section>
    <div id="photosContainer"></div>
    <div id="emptyState" class="empty-state hidden">
      <h3>No photo records</h3>
      <p>Add a photo record placeholder until Supabase upload is enabled.</p>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/doctor/photos-list.js"></script>
</body>
</html>
