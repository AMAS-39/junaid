<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Photos | Nutrition Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <button id="backBtn" type="button" class="back-btn">← Back to Patient</button>
    <section class="page-header">
      <div id="patientBanner"></div>
    </section>

    <div class="filter-row">
      <button type="button" class="filter-btn filter-active" data-filter="all">All</button>
      <button type="button" class="filter-btn" data-filter="medicine">Medicine</button>
      <button type="button" class="filter-btn" data-filter="meal">Meal</button>
      <button type="button" class="filter-btn" data-filter="progress">Progress</button>
      <button type="button" class="filter-btn" data-filter="lab-report">Lab Report</button>
    </div>

    <div id="photosContainer"></div>
    <div id="emptyState" class="empty-state hidden">
      <h3>No photos</h3>
      <p>This patient has not uploaded any photos yet.</p>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/doctor/photos-list.js"></script>
</body>
</html>
