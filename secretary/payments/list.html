<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments | Nutrition Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <section class="page-header">
      <h1 data-i18n="pages.payments.title">Payments</h1>
      <p data-i18n="pages.payments.subtitle">Record and track patient payments</p>
    </section>

    <div id="paymentSummary" class="mb-4"></div>

    <form id="paymentForm" class="patient-form-card">
      <h2 data-i18n="pages.payments.newPayment">New Payment</h2>
      <div class="form-group mb-3">
        <label for="patientSelect" data-i18n="pages.appointments.patientLabel">Patient</label>
        <select id="patientSelect" required class="form-input"></select>
      </div>
      <div class="form-group mb-3">
        <label for="amount" data-i18n="pages.payments.amountLabel">Amount</label>
        <input id="amount" type="number" required min="0.01" step="0.01" class="form-input" data-i18n-placeholder="pages.payments.amountPlaceholder" placeholder="0.00" />
      </div>
      <div class="form-group mb-3">
        <label for="serviceType" data-i18n="pages.payments.serviceTypeLabel">Service type</label>
        <input id="serviceType" type="text" required class="form-input" data-i18n-placeholder="pages.payments.serviceTypePlaceholder" placeholder="e.g. Consultation" />
      </div>
      <div class="form-group mb-3">
        <label for="paymentStatus" data-i18n="forms.status">Status</label>
        <select id="paymentStatus" class="form-input">
          <option value="paid" data-i18n="status.paid">Paid</option>
          <option value="unpaid" data-i18n="status.unpaid">Unpaid</option>
        </select>
      </div>
      <div class="form-group mb-4">
        <label for="note" data-i18n="pages.medicine.noteOptional">Note (optional)</label>
        <textarea id="note" class="form-textarea" rows="2" data-i18n-placeholder="pages.payments.notePlaceholder" placeholder="Payment details..."></textarea>
      </div>
      <button id="saveBtn" type="submit" class="view-btn" data-i18n="pages.payments.saveButton">Save Payment</button>
    </form>

    <div class="card mt-4">
      <input id="searchInput" type="text" data-i18n-placeholder="pages.payments.searchPlaceholder" placeholder="Search by patient name..." class="form-input" />
    </div>

    <div id="paymentsList" class="mt-4"></div>
    <div id="emptyState" class="empty-state hidden">
      <h3 data-i18n="pages.payments.emptyTitle">No payments</h3>
      <p data-i18n="pages.payments.emptyHint">Create a payment record above.</p>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/secretary/payments-list.js"></script>
</body>
</html>
