<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payments | Nutrition Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <section class="page-header">
      <h1>Payments</h1>
      <p>Record and track patient payments</p>
    </section>

    <div id="paymentSummary" class="mb-4"></div>

    <form id="paymentForm" class="patient-form-card">
      <h2>New Payment</h2>
      <div class="form-group mb-3">
        <label for="patientSelect">Patient</label>
        <select id="patientSelect" required class="form-input"></select>
      </div>
      <div class="form-group mb-3">
        <label for="amount">Amount</label>
        <input id="amount" type="number" required min="0.01" step="0.01" class="form-input" placeholder="0.00" />
      </div>
      <div class="form-group mb-3">
        <label for="serviceType">Service type</label>
        <input id="serviceType" type="text" required class="form-input" placeholder="e.g. Consultation" />
      </div>
      <div class="form-group mb-3">
        <label for="paymentStatus">Status</label>
        <select id="paymentStatus" class="form-input">
          <option value="paid">Paid</option>
          <option value="unpaid">Unpaid</option>
        </select>
      </div>
      <div class="form-group mb-4">
        <label for="note">Note (optional)</label>
        <textarea id="note" class="form-textarea" rows="2" placeholder="Payment details..."></textarea>
      </div>
      <button id="saveBtn" type="submit" class="view-btn">Save Payment</button>
    </form>

    <div class="card mt-4">
      <input id="searchInput" type="text" placeholder="Search by patient name..." class="form-input" />
    </div>

    <div id="paymentsList" class="mt-4"></div>
    <div id="emptyState" class="empty-state hidden">
      <h3>No payments</h3>
      <p>Create a payment record above.</p>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/secretary/payments-list.js"></script>
</body>
</html>
