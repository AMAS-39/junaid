<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Patient | Nutrition Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <div class="ncms-card p-5 sm:p-6 max-w-3xl">
      <h2 class="text-lg font-semibold text-slate-800 mb-1">Add Patient Account</h2>
      <p class="text-sm text-slate-500 mb-6">Register a new patient in the clinic system.</p>

      <form id="addPatientForm" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <input id="fullName" placeholder="Full Name" required class="ncms-input" />
        <input id="phone" placeholder="Phone" required class="ncms-input" />
        <input id="email" type="email" placeholder="Email" required class="ncms-input" />
        <input id="password" type="password" placeholder="Password (min. 6 characters)" required minlength="6" autocomplete="new-password" class="ncms-input" />
        <select id="gender" required class="ncms-input">
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
        <input id="age" type="number" placeholder="Age" required min="1" step="1" class="ncms-input" />
        <input id="height" type="number" placeholder="Height (cm)" required min="1" step="0.1" class="ncms-input" />
        <input id="currentWeight" type="number" placeholder="Current Weight (kg)" required min="1" step="0.1" class="ncms-input" />
        <input id="targetWeight" type="number" placeholder="Target Weight (kg)" required min="1" step="0.1" class="ncms-input sm:col-span-2" />
        <button id="saveBtn" type="submit" class="ncms-btn-primary sm:col-span-2 py-3.5">Create Patient Account</button>
      </form>
    </div>
  </div>
  <script type="module" src="../assets/js/pages/secretary/add-patient.js"></script>
</body>
</html>
