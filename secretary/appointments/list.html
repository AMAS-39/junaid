<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointments | Nutrition Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <section class="page-header">
      <h1 data-i18n="pages.appointments.title">Appointments</h1>
      <p data-i18n="pages.appointments.subtitleSecretary">Create and manage patient visits</p>
    </section>

    <div class="appointments-layout">
      <form id="appointmentForm" class="appointment-form-card">
        <div class="appointment-form-header">
          <span class="appointment-form-icon" aria-hidden="true">📅</span>
          <div>
            <h2 class="appointment-form-title" data-i18n="pages.appointments.createFormTitle">Create Appointment</h2>
            <p class="appointment-form-sub" data-i18n="pages.appointments.subtitleSecretary">Create and manage patient visits</p>
          </div>
        </div>
        <div class="appointment-form-body">
          <div class="form-group mb-3">
            <label for="patientSelect" data-i18n="pages.appointments.patientLabel">Patient</label>
            <select id="patientSelect" required class="form-input"></select>
          </div>
          <div class="form-group mb-3">
            <label for="appointmentDateTime" data-i18n="pages.appointments.dateTimeLabel">Date & time</label>
            <input id="appointmentDateTime" type="datetime-local" required class="form-input" />
          </div>
          <div class="form-group mb-3">
            <label for="reason" data-i18n="pages.appointments.reasonLabel">Reason</label>
            <input id="reason" type="text" required class="form-input" data-i18n-placeholder="pages.appointments.reasonPlaceholder" placeholder="Visit reason" />
          </div>
          <div class="form-group mb-4">
            <label for="appointmentStatus" data-i18n="pages.appointments.statusLabel">Status</label>
            <select id="appointmentStatus" class="form-input">
              <option value="approved" data-i18n="status.approved">Approved</option>
              <option value="pending" data-i18n="status.pending">Pending</option>
            </select>
          </div>
          <button id="saveBtn" type="submit" class="view-btn" data-i18n="buttons.createAppointment">Create Appointment</button>
        </div>
      </form>

      <div class="appointments-main">
        <div class="appointment-filters filter-row">
          <button type="button" class="filter-btn filter-active" data-filter="all" data-i18n="filters.all">All</button>
          <button type="button" class="filter-btn" data-filter="today" data-i18n="filters.today">Today</button>
          <button type="button" class="filter-btn" data-filter="pending" data-i18n="filters.pending">Pending</button>
          <button type="button" class="filter-btn" data-filter="approved" data-i18n="filters.approved">Approved</button>
        </div>

        <div id="appointmentsList" class="appointment-list"></div>
        <div id="emptyState" class="hidden"></div>
      </div>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/secretary/appointments-list.js"></script>
</body>
</html>
