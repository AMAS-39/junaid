<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointments | Nutrition Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <section class="page-header">
      <h1>Appointments</h1>
      <p>Create and manage patient visits</p>
    </section>

    <form id="appointmentForm" class="patient-form-card">
      <h2>Create Appointment</h2>
      <div class="form-group mb-3">
        <label for="patientSelect">Patient</label>
        <select id="patientSelect" required class="form-input"></select>
      </div>
      <div class="form-group mb-3">
        <label for="appointmentDateTime">Date & time</label>
        <input id="appointmentDateTime" type="datetime-local" required class="form-input" />
      </div>
      <div class="form-group mb-3">
        <label for="reason">Reason</label>
        <input id="reason" type="text" required class="form-input" placeholder="Visit reason" />
      </div>
      <div class="form-group mb-4">
        <label for="appointmentStatus">Status</label>
        <select id="appointmentStatus" class="form-input">
          <option value="approved">Approved</option>
          <option value="pending">Pending</option>
        </select>
      </div>
      <button id="saveBtn" type="submit" class="view-btn">Create Appointment</button>
    </form>

    <div class="filter-row">
      <button type="button" class="filter-btn filter-active" data-filter="all">All</button>
      <button type="button" class="filter-btn" data-filter="today">Today</button>
      <button type="button" class="filter-btn" data-filter="pending">Pending</button>
      <button type="button" class="filter-btn" data-filter="approved">Approved</button>
    </div>

    <div id="appointmentsList"></div>
    <div id="emptyState" class="empty-state hidden">
      <h3>No appointments</h3>
      <p>Create an appointment above.</p>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/secretary/appointments-list.js"></script>
</body>
</html>
