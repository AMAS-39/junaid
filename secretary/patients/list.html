<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patients | Nutrition Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../../assets/js/config/tailwind-setup.js"></script>
  <link rel="stylesheet" href="../../assets/css/main.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="page-content">
    <section class="page-header">
      <h1>Patient List</h1>
      <p>Search, view, and edit patient records</p>
    </section>
    <div class="card">
      <input id="searchInput" type="text" placeholder="Search by name or phone..." class="form-input" />
    </div>
    <div id="patientsContainer" class="patients-grid"></div>
    <div id="emptyState" class="empty-state hidden">
      <h3>No patients found</h3>
      <p>Add a patient or adjust your search.</p>
    </div>
  </div>
  <script type="module" src="../../assets/js/pages/secretary/patients-list.js"></script>
</body>
</html>
